<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- GitHub Pages SPA: restore path after redirect from 404.html (see vite build) -->
    <script>
      (function (l) {
        if (l.search.length <= 1) return;
        for (var q = 0; q < l.search.length; q++) {
          if (l.search.charAt(q) === '/') {
            var decoded = l.search
              .slice(1)
              .split('&')
              .map(function (s) {
                return s.replace(/~and~/g, '&');
              })
              .join('?');
            var base = l.pathname.replace(/\/$/, '');
            window.history.replaceState(null, null, base + decoded + l.hash);
            break;
          }
        }
      })(window.location);
    </script>
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GIS Portfolio Website</title>
    <meta name="twitter:card" content="summary_large_image">
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
